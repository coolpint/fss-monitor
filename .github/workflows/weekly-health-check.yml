name: 금감원 징계공시 모니터 주간 점검

on:
  schedule:
    - cron: '45 6 * * 5'  # 매주 금요일 15:45 KST (UTC 06:45)
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  weekly-health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly health check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python weekly_health_check.py
